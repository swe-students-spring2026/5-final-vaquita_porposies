name: meme-generator-service

on:
  push:
    branches: [main, master]
    paths:
      - 'meme_generator_service/**'
      - '.github/workflows/meme-generator-service.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'meme_generator_service/**'
      - '.github/workflows/meme-generator-service.yml'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meme_generator_service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=term-missing --cov-fail-under=80 tests

      - name: Build Docker image
        run: docker build -t meme-generator-service:ci .